# ─────────────────────────────────────────────────────────────
# CheemScript — Docker Compose
# Un solo comando: docker compose up --build
# ─────────────────────────────────────────────────────────────

services:
  # ── Backend: Node.js + g++ (compilador C++) ──────────────
  backend:
    build: ./backend
    container_name: cheemscript-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    # Limitar recursos por seguridad (compilaciones C++)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Frontend: React (Vite build) + Nginx ─────────────────
  frontend:
    build: ./frontend
    container_name: cheemscript-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
